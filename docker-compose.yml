services:
  trainingpeaks-mcp:
    build: .
    container_name: trainingpeaks-mcp
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - PORT=8001
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
